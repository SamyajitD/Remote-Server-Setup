# ==============================================================================
# tmux config README / key guide
# ==============================================================================
#
# This config is designed around fast keyboard navigation, vi-style copy mode,
# session switching, and a minimal top status bar.
#
# Key notation used below:
#
#   C      = Ctrl
#   M      = Alt / Meta
#   S      = Shift
#   Prefix = C-Space, or C-b as fallback
#
# Main prefix keys:
#
#   C-Space        Primary tmux prefix
#   C-b            Secondary prefix, kept from tmux default
#
# Most commands below are used as:
#
#   Prefix + key
#
# Bindings marked "no prefix" work directly from the terminal.
#
# ------------------------------------------------------------------------------
# Config / help
# ------------------------------------------------------------------------------
#
#   Prefix + q     Reload this config file
#
#   NOTE:
#   tmux default Prefix + q shows pane numbers. This config replaces that with
#   reload-config because reloading is used more often while editing tmux.conf.
#
# Useful tmux commands:
#
#   tmux source-file ~/.config/tmux/tmux.conf     Reload config manually
#   tmux list-keys                                Show all active key bindings
#   tmux list-keys -N                             Show bindings that have notes
#   Prefix + ?                                    Show tmux key bindings UI
#
# ------------------------------------------------------------------------------
# Copy mode
# ------------------------------------------------------------------------------
#
# Copy mode uses vi keys.
#
#   Prefix + [     Enter copy mode                 tmux default
#
# Inside copy mode:
#
#   v              Start selection
#   y              Copy selection and exit copy mode
#   Escape         Clear selection / leave mode    tmux default behavior
#
# ------------------------------------------------------------------------------
# Pane management
# ------------------------------------------------------------------------------
#
#   Prefix + h     Split current pane top/bottom
#                  Internally uses: split-window -v
#
#   Prefix + v     Split current pane left/right
#                  Internally uses: split-window -h
#
#   Prefix + x     Kill current pane
#                  Same idea as tmux default Prefix + x
#
# No-prefix pane navigation:
#
#   C-M-Left       Move to pane on the left
#   C-M-Right      Move to pane on the right
#   C-M-Up         Move to pane above
#   C-M-Down       Move to pane below
#
# No-prefix pane resizing:
#
#   C-M-S-Left     Resize pane left  by 5 cells
#   C-M-S-Right    Resize pane right by 5 cells
#   C-M-S-Up       Resize pane up    by 5 cells
#   C-M-S-Down     Resize pane down  by 5 cells
#
# Terminal note:
# Some terminals do not send unique key sequences for Ctrl+Alt+Shift+Arrow.
# If resizing does not work, check your terminal keybinding support first.
#
# Related tmux defaults still useful:
#
#   Prefix + z     Toggle zoom for current pane
#   Prefix + Space Cycle pane layouts
#   Prefix + ;     Go to previously active pane
#
# ------------------------------------------------------------------------------
# Window management
# ------------------------------------------------------------------------------
#
#   Prefix + c     Create a new window in the current pane's directory
#                  Similar to tmux default Prefix + c, but preserves path
#
#   Prefix + r     Rename current window
#                  Replaces tmux default Prefix + r, which redraws the client
#
#   Prefix + k     Kill current window
#                  Alternative to tmux default Prefix + &
#
# No-prefix window selection:
#
#   M-1            Select window 1
#   M-2            Select window 2
#   M-3            Select window 3
#   M-4            Select window 4
#   M-5            Select window 5
#   M-6            Select window 6
#   M-7            Select window 7
#   M-8            Select window 8
#   M-9            Select window 9
#
# No-prefix window navigation:
#
#   M-Left         Select previous window
#   M-Right        Select next window
#
# No-prefix window reordering:
#
#   M-S-Left       Move current window one position left
#   M-S-Right      Move current window one position right
#
# Related tmux defaults still useful:
#
#   Prefix + n     Next window
#   Prefix + p     Previous window
#   Prefix + ,     Rename window
#   Prefix + &     Kill window
#   Prefix + w     Choose window from list
#
# ------------------------------------------------------------------------------
# Session management
# ------------------------------------------------------------------------------
#
#   Prefix + o     Open sesh picker in a popup using: tv sesh
#                  Replaces tmux default Prefix + o, which selects next pane
#
#   Prefix + R     Rename current session
#                  Alternative to tmux default Prefix + $
#
#   Prefix + C     Create a new session in the current pane's directory
#
#   Prefix + K     Kill current session
#
#   Prefix + P     Switch to previous session
#                  Similar to tmux default Prefix + (
#
#   Prefix + N     Switch to next session
#                  Similar to tmux default Prefix + )
#
# No-prefix session navigation:
#
#   M-Up           Switch to previous session
#   M-Down         Switch to next session
#
# Related tmux defaults still useful:
#
#   Prefix + d     Detach from tmux
#   Prefix + s     Choose session from list
#   Prefix + $     Rename session
#   Prefix + (     Previous session
#   Prefix + )     Next session
#
# ------------------------------------------------------------------------------
# Behavior / UI summary
# ------------------------------------------------------------------------------
#
# General behavior:
#
#   - Mouse support is enabled.
#   - Window and pane numbering starts at 1 instead of 0.
#   - Windows are renumbered automatically after one is closed.
#   - Scrollback history is set to 50000 lines.
#   - Escape delay is disabled for snappier vim/neovim usage.
#   - Clipboard integration is enabled.
#   - New panes/windows open in the current pane's working directory.
#
# Status bar:
#
#   - Status bar is shown at the top.
#   - Left side shows the session name.
#   - Right side shows PREFIX when prefix mode is active.
#   - Right side shows ZOOM when the current pane is zoomed.
#   - Window names are automatically based on the current pane path.
#
# Theme:
#
#   - Minimal blue/black/default terminal-color theme.
#   - Active pane border is blue.
#   - Inactive pane borders are bright black.
#
# ------------------------------------------------------------------------------
# Changed tmux defaults worth knowing
# ------------------------------------------------------------------------------
#
#   Prefix + q     Now reloads config instead of showing pane numbers
#   Prefix + r     Now renames window instead of redrawing client
#   Prefix + o     Now opens sesh popup instead of selecting next pane
#
# ==============================================================================
# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind-key -N "Open sesh Television picker" o display-popup -E -w 70% -h 80% -d "#{pane_current_path}" -T "sesh" "tv sesh"
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
