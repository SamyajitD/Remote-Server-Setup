##### Reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "reloaded ~/.tmux.conf"

##### Terminal / colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

##### Prefix + UX (your choices)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

set -g mouse on
setw -g mode-keys vi
set -g status-position top

##### Fast sane defaults
set -g escape-time 0
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### Keep cwd on splits/windows
bind c  new-window      -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

##### Pane navigation (your hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar
set -g status on
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=default,fg=colour250"
set -g status-left-length 100
set -g status-right-length 100

# Messages
set -g message-style "fg=colour45,bg=colour238,align=centre"
set -g message-command-style "fg=colour45,bg=colour238,align=centre"

# Panes
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour33"

# Windows
set -g window-status-activity-style "fg=colour250,bg=default,none"
set -g window-status-separator ""
set -g window-status-style "fg=colour250,bg=default,none"

# Left: session + window list starts immediately after
set -g status-left "#[fg=colour33,bold]#S#[default] #[fg=colour238]|#[default] "

# Current window:
# - keeps your “(✓)”
# - shows a *trimmed* path tail (no shell)
# - shows Z when zoomed (window_zoomed_flag)
# Trim uses tmux's = modifier (built-in, cheap). :contentReference[oaicite:4]{index=4}
set -g window-status-current-format \
"#[fg=colour33] #I: #[fg=colour141](✓) #[fg=colour45]#{=|-24|…:pane_current_path}#{?window_zoomed_flag, #[fg=colour214]Z#[fg=colour45],} #[default]"

# Other windows: index + name + zoom marker
# set -g window-status-format \
# "#[fg=colour33] #I: #[fg=colour250]#W#{?window_zoomed_flag, #[fg=colour214]Z#[fg=colour250],} #[default]"

# setw -g window-status-current-format \
"#[fg=colour33] #I: #[fg=colour141]#{?window_zoomed_flag,(🔍),(✓)} #[fg=colour45]#{=|-24|…:pane_current_path} #[default]"

# zoomed -> (🔍︎)  normal -> (✓)
setw -g window-status-current-format \
"#[fg=colour33] #I: #[fg=colour141]#{?window_zoomed_flag,(🔍︎),(✓)} #[fg=colour45]#{=|-24|…:pane_current_path} #[default]"


# Right side:
# keep it informative but still cheap (no #(…))
# shows: window | prefix-indicator | session | time
# client_prefix conditional is built-in. :contentReference[oaicite:5]{index=5}

# Right side: window | session | datetime (rounded segments)
set -g status-right "#[fg=colour238,bg=default]#[fg=colour250,bg=colour238] #W #[fg=colour33,bg=colour238]#[fg=colour16,bg=colour33] #S #[fg=colour238,bg=colour33]#[fg=colour250,bg=colour238] %Y-%m-%d %H:%M #[fg=colour238,bg=default]#[default]"


# Bind 'prefix + o' to open the sessionizer in a floating popup
bind-key o display-popup -E "tmux-sessionizer"


